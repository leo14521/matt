<!doctype html>
<html lang="ko">
  <head>
    <link rel="icon" href="./images/favicon.png" type="image/png" />
    <link rel="shortcut icon" href="./favicon.png" type="image/png" />

    <meta property="og:title" content="부천 맛토리텔링아카데미" />
    <meta
      property="og:description"
      content="진짜로 우리끼리 보려고 만든 맛집 지도 🤤" />
    <meta property="og:image" content="./favicon.png" />

    <meta
      property="og:image"
      content="https://maatzip.netlify.app/images/favicon.png" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부천 맛토리텔링아카데미</title>
    <style>
      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2")
          format("woff2");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Paperlogy";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2")
          format("woff2");
        font-weight: 700;
        font-display: swap;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />

    <style>
      /* --- 화려하고 깔끔 · 페이퍼로지 --- */
      :root {
        --bg: #fafafa;
        --bg-card: #ffffff;
        --text-main: #1a1a1a;
        --text-muted: #5c5c5c;
        --border: #eee;
        --accent: #e84a5f;
        --accent-soft: #ff6b7a;
        --accent-dark: #c73e4d;
        --gradient: linear-gradient(135deg, #e84a5f 0%, #ff8e53 100%);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Paperlogy", sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text-main);
        overflow: hidden;
        display: flex;
        height: 100vh;
      }

      .sidebar {
        width: 360px;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        padding: 28px 22px;
        display: flex;
        flex-direction: column;
        z-index: 10;
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.06);
      }

      .header h1 {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.3;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        color: var(--text-main);
      }

      .header h1 .accent {
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 700;
      }

      .header p {
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 24px;
      }

      .sidebar-list-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .sidebar-back {
        font-family: "Paperlogy", sans-serif;
        font-size: 13px;
        color: var(--accent);
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px 0;
        margin-bottom: 12px;
        font-weight: 600;
      }
      .sidebar-back:hover {
        text-decoration: underline;
      }

      .region-list,
      .restaurant-list {
        list-style: none;
        overflow-y: auto;
        flex-grow: 1;
        padding-right: 8px;
        margin: 0;
      }

      .region-item {
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 16px 18px;
        border-radius: 12px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .region-item:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 16px rgba(232, 74, 95, 0.15);
      }
      .region-item .region-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-main);
      }
      .region-item .region-count {
        font-size: 14px;
        color: var(--accent);
        font-weight: 600;
      }

      .restaurant-list::-webkit-scrollbar {
        width: 6px;
      }
      .restaurant-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 6px;
      }

      .restaurant-item {
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 14px 16px;
        border-radius: 12px;
        margin-bottom: 12px;
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .restaurant-item:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 16px rgba(232, 74, 95, 0.15);
      }

      .restaurant-item .item-body {
        pointer-events: none;
      }

      .restaurant-item .item-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        pointer-events: auto;
      }

      .restaurant-item .item-actions button {
        font-family: "Paperlogy", sans-serif;
        font-size: 12px;
        padding: 6px 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
      }

      .restaurant-item .btn-review {
        background: rgba(232, 74, 95, 0.15);
        color: var(--accent);
      }
      .restaurant-item .btn-review:hover {
        background: rgba(232, 74, 95, 0.25);
      }

      .restaurant-item .btn-edit {
        background: rgba(232, 74, 95, 0.12);
        color: var(--accent);
      }
      .restaurant-item .btn-edit:hover {
        background: rgba(232, 74, 95, 0.2);
      }

      .restaurant-item .btn-delete {
        background: rgba(0, 0, 0, 0.06);
        color: var(--text-muted);
      }
      .restaurant-item .btn-delete:hover {
        background: rgba(232, 74, 95, 0.12);
        color: var(--accent);
      }

      .restaurant-item h3 {
        font-size: 16px;
        margin-bottom: 4px;
        color: var(--text-main);
      }

      .restaurant-item p {
        font-size: 13px;
        color: var(--text-muted);
      }

      .map-area {
        flex-grow: 1;
        position: relative;
        min-height: 0;
      }

      #map {
        width: 100%;
        height: 100%;
        min-height: 300px;
      }

      .map-area .map-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--text-muted);
        font-size: 14px;
      }

      .fab {
        position: fixed;
        bottom: 32px;
        right: 32px;
        width: 58px;
        height: 58px;
        background: var(--gradient);
        color: #fff;
        border: none;
        border-radius: 50%;
        font-size: 28px;
        font-weight: 300;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(232, 74, 95, 0.4);
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .fab:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 28px rgba(232, 74, 95, 0.5);
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.25s ease,
          visibility 0.25s ease;
      }

      .modal-overlay.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(45, 45, 45, 0.55);
        z-index: 0;
      }

      .modal-content {
        position: relative;
        z-index: 1;
        background: var(--bg-card);
        border: 1px solid var(--border);
        padding: 36px;
        border-radius: 16px;
        width: 400px;
        max-width: 90vw;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
        transform: scale(0.95);
        transition: transform 0.25s ease;
      }

      .modal-overlay.active .modal-content {
        transform: scale(1);
      }

      .modal-content h2 {
        margin-bottom: 20px;
        font-size: 20px;
        color: var(--text-main);
      }

      .input-group {
        margin-bottom: 18px;
      }

      .input-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .input-group input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text-main);
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }

      .input-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(232, 74, 95, 0.15);
      }

      .form-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Paperlogy", sans-serif;
      }

      .btn-cancel {
        background: var(--bg);
        color: var(--text-main);
        border: 1px solid var(--border);
      }
      .btn-cancel:hover {
        background: var(--border);
      }

      .btn-submit {
        background: var(--gradient);
        color: #fff;
      }
      .btn-submit:hover {
        box-shadow: 0 4px 16px rgba(232, 74, 95, 0.35);
      }

      /* 리뷰 영역 */
      .review-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: var(--accent);
        margin-top: 6px;
        font-weight: 500;
      }
      .review-list {
        list-style: none;
        margin: 0 0 16px 0;
        padding: 0;
        max-height: 200px;
        overflow-y: auto;
      }
      .review-list li {
        padding: 12px;
        background: var(--bg);
        border-radius: 10px;
        margin-bottom: 8px;
        border: 1px solid var(--border);
      }
      .review-list li:last-child {
        margin-bottom: 0;
      }
      .review-author {
        font-weight: 600;
        font-size: 13px;
        color: var(--text-main);
        margin-bottom: 4px;
      }
      .review-content {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.5;
      }
      .review-empty {
        font-size: 13px;
        color: var(--text-muted);
        padding: 16px;
        text-align: center;
      }
      .region-list .review-empty {
        list-style: none;
      }
      .input-group textarea {
        width: 100%;
        min-height: 80px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 15px;
        font-family: "Paperlogy", sans-serif;
        resize: vertical;
        background: var(--bg);
        color: var(--text-main);
      }
      .input-group textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(232, 74, 95, 0.15);
      }

      /* 모바일 최적화 */
      /* 📱 모바일 최적화 (지도 상단, 리스트 하단 분할 및 터치 최적화) */
      /* 📱 모바일 UX: 네이티브 앱 스타일 바텀 시트 */
      @media (max-width: 768px) {
        body {
          flex-direction: column;
          overflow: hidden;
          position: relative;
        }
        /* 드래그 손잡이 부분 브라우저 간섭 차단 (굳어짐 방지 핵심!) */
        #drag-handle,
        #sheet-header {
          touch-action: none;
        }
        .map-area {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100vh; /* 지도는 항상 전체 화면 */
          z-index: 1;
        }

        .sidebar {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          width: 100%;
          height: 45vh; /* 기본적으로 화면의 45%만 차지 */
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(10px); /* 뒤에 비치는 지도 블러 처리 */
          border-radius: 24px 24px 0 0;
          box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.15);
          padding: 12px 16px 20px;
          z-index: 100;
          transition: height 0.3s cubic-bezier(0.25, 1, 0.5, 1); /* 부드러운 스냅 애니메이션 */
          border: none;
        }

        .sidebar.dragging {
          transition: none;
        } /* 드래그 중에는 애니메이션 끄기 */

        /* 드래그 손잡이 디자인 */
        .drag-handle {
          width: 40px;
          height: 5px;
          background: #ccc;
          border-radius: 3px;
          margin: 0 auto 12px;
          flex-shrink: 0;
        }

        .header h1 {
          font-size: 20px;
        }
        .header p {
          font-size: 12px;
          margin-bottom: 12px;
        }

        .restaurant-item {
          padding: 18px;
        }
        .restaurant-item h3 {
          font-size: 18px;
        }
        .item-actions button {
          padding: 12px 0;
          font-size: 14px;
        } /* 터치하기 쉽게 확장 */

        .fab {
          /* 버튼이 바텀 시트 위로 따라다니도록 위치 조정 */
          bottom: calc(var(--sheet-height, 45vh) + 20px);
          right: 20px;
          width: 56px;
          height: 56px;
          transition: bottom 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .sidebar.dragging ~ .fab {
          transition: none;
        }

        .modal-content {
          width: 92vw;
          padding: 24px;
          max-height: 85vh;
          overflow-y: auto;
        }
      }

      /* PC에서는 손잡이 숨김 */
      @media (min-width: 769px) {
        .drag-handle {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" style="display: contents">
      <aside class="sidebar" id="bottom-sheet">
        <div class="drag-handle" id="drag-handle"></div>
        <header class="header" id="sheet-header">
          <h1>부천 <span class="accent">맛토리텔링 아카데미</span></h1>
          <p>진짜로 우리끼리 보려고 만든 지도</p>
        </header>
        <div class="sidebar-list-wrap">
          <button
            type="button"
            class="sidebar-back"
            id="btn-back-region"
            style="display: none">
            ← 지역 목록
          </button>
          <ul class="region-list" id="region-list"></ul>
          <ul
            class="restaurant-list"
            id="list-container"
            style="display: none"></ul>
        </div>
      </aside>

      <main class="map-area" id="map-container">
        <div id="map"></div>
        <div class="map-loading" id="map-loading">지도를 불러오는 중…</div>
      </main>

      <button class="fab" id="btn-open-modal">+</button>

      <div class="modal-overlay" id="modal">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
          <h2>새로운 맛집 등록 📍</h2>
          <form id="add-form">
            <div class="input-group">
              <label>맛집 이름</label>
              <input
                type="text"
                id="input-name"
                placeholder="웹툰센터앞 순대트럭"
                required />
            </div>
            <div class="input-group">
              <label>한 줄 추천사</label>
              <input
                type="text"
                id="input-desc"
                placeholder="OO님이 일주일에 3번 간다는 그곳..!"
                required />
            </div>
            <div class="input-group">
              <label>지역 (시·군)</label>
              <input
                type="text"
                id="input-region"
                placeholder="예: 부천시, 인천광역시"
                required />
            </div>
            <div class="input-group">
              <label>위치 검색</label>
              <input
                type="text"
                id="input-search"
                placeholder="인근 역명 또는 주소 (예: 부천역, 부천시 중동)"
                required
                autocomplete="off" />
              <p class="form-hint">
                동 or 근처 역 이름만 입력 (외국지도앱이라 정확한 주소 인식못함)
              </p>
            </div>
            <div class="input-group">
              <label>등록자 비밀번호</label>
              <input
                type="password"
                id="input-pw"
                placeholder="수정·삭제 시 사용할 비밀번호"
                required
                autocomplete="new-password" />
              <p class="form-hint">
                등록자만 이 비밀번호로 수정·삭제할 수 있습니다.
              </p>
            </div>
            <div class="btn-group">
              <button type="button" class="btn btn-cancel" id="btn-close-modal">
                취소
              </button>
              <button type="submit" class="btn btn-submit">지도에 박기</button>
            </div>
          </form>
        </div>
      </div>

      <div class="modal-overlay" id="modal-pw">
        <div class="modal-backdrop" id="modal-pw-backdrop"></div>
        <div class="modal-content">
          <h2>비밀번호 확인</h2>
          <p class="form-hint" style="margin-bottom: 12px">
            등록 시 입력한 비밀번호를 입력하세요.
          </p>
          <div class="input-group">
            <input
              type="password"
              id="input-pw-check"
              placeholder="비밀번호"
              autocomplete="off" />
          </div>
          <div class="btn-group">
            <button type="button" class="btn btn-cancel" id="btn-pw-cancel">
              취소
            </button>
            <button type="button" class="btn btn-submit" id="btn-pw-confirm">
              확인
            </button>
          </div>
        </div>
      </div>

      <div class="modal-overlay" id="modal-edit">
        <div class="modal-backdrop" id="modal-edit-backdrop"></div>
        <div class="modal-content">
          <h2>맛집 수정 ✏️</h2>
          <form id="edit-form">
            <input type="hidden" id="edit-id" />
            <div class="input-group">
              <label>맛집 이름</label>
              <input type="text" id="edit-name" required />
            </div>
            <div class="input-group">
              <label>한 줄 추천사</label>
              <input type="text" id="edit-desc" required />
            </div>
            <div class="input-group">
              <label>지역 (시·군)</label>
              <input type="text" id="edit-region" placeholder="예: 부천시" />
            </div>
            <div class="input-group">
              <label>위치 검색 (변경 시에만 입력)</label>
              <input
                type="text"
                id="edit-search"
                placeholder="비워두면 기존 위치 유지"
                autocomplete="off" />
            </div>
            <div class="btn-group">
              <button type="button" class="btn btn-cancel" id="btn-edit-cancel">
                취소
              </button>
              <button type="submit" class="btn btn-submit">수정 완료</button>
            </div>
          </form>
        </div>
      </div>

      <div class="modal-overlay" id="modal-review">
        <div class="modal-backdrop" id="modal-review-backdrop"></div>
        <div class="modal-content">
          <h2 id="review-modal-title">맛집 리뷰</h2>
          <p class="form-hint" style="margin-bottom: 12px">
            부스텔(부천스토리텔링아카데미) 멤버의 실제 리뷰를 남겨보세요.
          </p>
          <ul class="review-list" id="review-list"></ul>
          <form id="review-form">
            <input type="hidden" id="review-rest-id" />
            <div class="input-group">
              <label>부스텔 멤버 이름</label>
              <input
                type="text"
                id="review-author"
                placeholder="닉네임 또는 이름"
                required />
            </div>
            <div class="input-group">
              <label>리뷰</label>
              <textarea
                id="review-content"
                placeholder="이 맛집에 대한 솔직한 리뷰를 적어주세요."
                required></textarea>
            </div>
            <div class="btn-group">
              <button
                type="button"
                class="btn btn-cancel"
                id="btn-review-close">
                닫기
              </button>
              <button type="submit" class="btn btn-submit">리뷰 등록</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Firebase: 설정을 가장 먼저 로드해 PC/휴대폰 연동을 보장 -->
    <script>
      window.FIREBASE_CONFIG_PLACEHOLDER = {
        apiKey: "AIzaSyDmj5E_vrh1gA5bQ3CQn1X840w8tBmTYcE",
        authDomain: "maatzip-dccde.firebaseapp.com",
        projectId: "maatzip-dccde",
        storageBucket: "maatzip-dccde.firebasestorage.app",
        messagingSenderId: "734715366064",
        appId: "1:734715366064:web:b63e9c8652e58189378975",
        measurementId: "G-J04MZCE01V",
      };
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Leaflet + OpenStreetMap: API 키·결제 없이 무료 사용 -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""></script>
    <script>
      let restaurants = [];

      function normalizeRestaurants() {
        restaurants.forEach(function (r) {
          r.id = Number(r.id) || r.id;
          if (r.password == null || String(r.password).trim() === "")
            r.password = "0000";
          if (!r.reviews) r.reviews = [];
          if (!r.region || String(r.region).trim() === "") r.region = "기타";
        });
      }

      function getRestById(id) {
        var numId = Number(id);
        return restaurants.find(function (r) {
          return Number(r.id) === numId;
        });
      }

      const listContainer = document.getElementById("list-container");
      const regionListEl = document.getElementById("region-list");
      const btnBackRegion = document.getElementById("btn-back-region");
      const mapLoading = document.getElementById("map-loading");
      const modal = document.getElementById("modal");
      const modalPw = document.getElementById("modal-pw");
      const modalEdit = document.getElementById("modal-edit");
      const modalReview = document.getElementById("modal-review");
      const btnOpenModal = document.getElementById("btn-open-modal");
      const btnCloseModal = document.getElementById("btn-close-modal");
      const addForm = document.getElementById("add-form");
      const editForm = document.getElementById("edit-form");
      const reviewForm = document.getElementById("review-form");
      const inputPwCheck = document.getElementById("input-pw-check");
      const btnPwCancel = document.getElementById("btn-pw-cancel");
      const btnPwConfirm = document.getElementById("btn-pw-confirm");
      const btnEditCancel = document.getElementById("btn-edit-cancel");
      const btnReviewClose = document.getElementById("btn-review-close");

      let map = null;
      let markers = [];
      let pwAction = null;
      let pwRestId = null;
      let selectedRegion = null;

      function getRegions() {
        var counts = {};
        restaurants.forEach(function (rest) {
          var r =
            rest.region && rest.region.trim() ? rest.region.trim() : "기타";
          counts[r] = (counts[r] || 0) + 1;
        });
        return Object.keys(counts)
          .sort()
          .map(function (name) {
            return { name: name, count: counts[name] };
          });
      }

      function showRegionList() {
        selectedRegion = null;
        regionListEl.style.display = "";
        listContainer.style.display = "none";
        btnBackRegion.style.display = "none";
        regionListEl.innerHTML = "";
        var counts = {};
        restaurants.forEach(function (r) {
          var reg = r.region || "기타";
          counts[reg] = (counts[reg] || 0) + 1;
        });
        var regions = Object.keys(counts)
          .sort()
          .map(function (n) {
            return { name: n, count: counts[n] };
          });

        if (regions.length === 0) {
          regionListEl.innerHTML =
            '<li style="padding:16px; text-align:center; color:#888;">등록된 맛집이 없습니다.</li>';
          return;
        }
        regions.forEach(function (rg) {
          var li = document.createElement("li");
          li.className = "region-item";
          li.innerHTML =
            '<span class="region-name">' +
            escapeHtml(rg.name) +
            '</span><span class="region-count">' +
            rg.count +
            "곳</span>";
          li.onclick = function () {
            selectedRegion = rg.name;
            showRestaurantList();
          };
          regionListEl.appendChild(li);
        });

        // 📱 모바일 UX: 지역 목록으로 오면 시트를 45% 기본 크기로 원상복구
        if (window.innerWidth <= 768) {
          const sheet = document.getElementById("bottom-sheet");
          if (sheet) {
            sheet.style.height = "45vh";
            document.documentElement.style.setProperty(
              "--sheet-height",
              "45vh",
            );
          }
        }
      }
      function showRestaurantList() {
        regionListEl.style.display = "none";
        listContainer.style.display = "";
        btnBackRegion.style.display = "block";
        var filtered = restaurants.filter(function (r) {
          return (r.region || "기타") === selectedRegion;
        });

        listContainer.innerHTML = "";
        filtered.forEach(function (rest) {
          var li = document.createElement("li");
          li.className = "restaurant-item";
          li.innerHTML =
            '<div onclick="focusRestaurant(' +
            rest.id +
            ')">' +
            "<h3>" +
            escapeHtml(rest.name) +
            "</h3><p>" +
            escapeHtml(rest.desc) +
            "</p>" +
            '<span class="review-badge">리뷰 ' +
            (rest.reviews ? rest.reviews.length : 0) +
            "개</span></div>" +
            '<div class="item-actions">' +
            '<button type="button" class="btn-review" onclick="openReviewModal(' +
            rest.id +
            ')">리뷰보기</button>' +
            '<button type="button" class="btn-edit" onclick="openPwModal(\'edit\', ' +
            rest.id +
            ')">수정</button>' +
            '<button type="button" class="btn-delete" onclick="openPwModal(\'delete\', ' +
            rest.id +
            ')">삭제</button></div>';
          listContainer.appendChild(li);
        });

        // 📱 모바일 UX: 맛집 목록을 누르면 리스트를 시원하게 보라고 시트를 화면 끝(90%)까지 쫙 펴줌!
        if (window.innerWidth <= 768) {
          const sheet = document.getElementById("bottom-sheet");
          if (sheet) {
            sheet.style.height = "90vh";
            document.documentElement.style.setProperty(
              "--sheet-height",
              "90vh",
            );
          }
        }
      }

      function renderRestaurantList(list) {
        listContainer.innerHTML = "";
        (list || []).forEach(function (rest) {
          if (!rest.reviews) rest.reviews = [];
          var reviewCount = rest.reviews.length;
          var restIdStr = String(rest.id);
          var li = document.createElement("li");
          li.className = "restaurant-item";

          li.innerHTML =
            '<div class="item-body"><h3>' +
            escapeHtml(rest.name) +
            "</h3><p>" +
            escapeHtml(rest.desc) +
            "</p>" +
            '<span class="review-badge">리뷰 ' +
            reviewCount +
            "개</span></div>" +
            '<div class="item-actions">' +
            '<button type="button" class="btn-review" data-rest-id="' +
            restIdStr +
            '">리뷰</button>' +
            '<button type="button" class="btn-edit" data-rest-id="' +
            restIdStr +
            '">수정</button>' +
            '<button type="button" class="btn-delete" data-rest-id="' +
            restIdStr +
            '">삭제</button>' +
            "</div>";

          li.dataset.id = restIdStr;

          li.addEventListener("click", function (e) {
            if (!e.target.closest(".item-actions")) focusRestaurant(rest);
          });

          li.querySelector(".btn-review").addEventListener(
            "click",
            function (e) {
              e.stopPropagation();
              var targetId = e.currentTarget.getAttribute("data-rest-id");
              var r = getRestById(targetId);
              if (r) openReviewModal(r);
            },
          );

          li.querySelector(".btn-edit").addEventListener("click", function (e) {
            e.stopPropagation();
            var targetId = e.currentTarget.getAttribute("data-rest-id");
            openPwModal("edit", targetId);
          });

          li.querySelector(".btn-delete").addEventListener(
            "click",
            function (e) {
              e.stopPropagation();
              var targetId = e.currentTarget.getAttribute("data-rest-id");
              openPwModal("delete", targetId);
            },
          );

          listContainer.appendChild(li);
        });
      }

      btnBackRegion.addEventListener("click", showRegionList);

      function openReviewModal(rest) {
        document.getElementById("review-modal-title").textContent =
          rest.name + " · 부스텔 리뷰";
        document.getElementById("review-rest-id").value = rest.id;
        document.getElementById("review-author").value = "";
        document.getElementById("review-content").value = "";
        var listEl = document.getElementById("review-list");
        listEl.innerHTML = "";
        if (!rest.reviews || rest.reviews.length === 0) {
          listEl.innerHTML =
            '<li class="review-empty">아직 리뷰가 없어요. 첫 리뷰를 남겨보세요!</li>';
        } else {
          rest.reviews.forEach(function (r) {
            var li = document.createElement("li");
            li.innerHTML =
              '<div class="review-author">' +
              escapeHtml(r.author) +
              '</div><div class="review-content">' +
              escapeHtml(r.content) +
              "</div>";
            listEl.appendChild(li);
          });
        }
        modalReview.classList.add("active");
      }

      function escapeHtml(s) {
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function closeReviewModal() {
        modalReview.classList.remove("active");
      }

      function openPwModal(action, restId) {
        pwAction = action;
        var num = parseInt(restId, 10);
        pwRestId = isNaN(num) ? restId : num;
        inputPwCheck.value = "";
        modalPw.classList.add("active");
        inputPwCheck.focus();
      }

      function closePwModal() {
        modalPw.classList.remove("active");
        pwAction = null;
        pwRestId = null;
      }

      function openEditModal(rest) {
        document.getElementById("edit-id").value = rest.id;
        document.getElementById("edit-name").value = rest.name;
        document.getElementById("edit-desc").value = rest.desc;
        document.getElementById("edit-region").value = rest.region || "";
        document.getElementById("edit-search").value = "";
        modalEdit.classList.add("active");
      }

      function closeEditModal() {
        modalEdit.classList.remove("active");
      }

      function focusRestaurant(restParam) {
        if (!map) return;

        var rest =
          typeof restParam === "object" ? restParam : getRestById(restParam);
        if (!rest || rest.lat === undefined || rest.lng === undefined) return;

        // 지도 위치만 딱 이동시키고 끝냅니다.
        map.setView([rest.lat, rest.lng], 15);

        // 🚨 목록을 바닥으로 숨겨버리던 주범(15vh 축소 로직)을 삭제했습니다!
      }
      // 👇 실수로 지워졌던 initMap 함수 뚜껑을 다시 살려놓았습니다!
      function initMap() {
        var loadingEl = document.getElementById("map-loading");
        if (loadingEl) loadingEl.style.display = "none";

        map = L.map("map").setView([37.5034, 126.766], 12);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        }).addTo(map);
        updateMarkers();
      }

      function updateMarkers() {
        if (!map) return;
        markers.forEach(function (m) {
          map.removeLayer(m);
        });
        markers = [];

        restaurants.forEach(function (rest) {
          var cnt = (rest.reviews && rest.reviews.length) || 0;
          var html =
            "<div style=\"padding:12px 14px;min-width:160px;font-size:13px;background:#fff;color:#1a1a1a;border-radius:10px;border:1px solid #eee;box-shadow:0 4px 16px rgba(0,0,0,0.08);font-family:'Paperlogy',sans-serif;\"><strong>" +
            rest.name +
            '</strong><br/><span style="color:#5c5c5c;">' +
            rest.desc +
            '</span><br/><span style="color:#e84a5f;font-size:12px;">부스텔 리뷰 ' +
            cnt +
            "개</span></div>";
          var marker = L.marker([rest.lat, rest.lng])
            .addTo(map)
            .bindPopup(html);
          markers.push(marker);
        });
      }

      function updateUI() {
        if (selectedRegion) showRestaurantList();
        else showRegionList();
        if (map) updateMarkers();
      }

      initMap();

      btnOpenModal.addEventListener("click", function () {
        modal.classList.add("active");
        document.getElementById("input-name").focus();
      });

      btnCloseModal.addEventListener("click", function () {
        modal.classList.remove("active");
        addForm.reset();
      });

      modal.addEventListener("click", function (e) {
        if (e.target === modal || e.target.id === "modal-backdrop") {
          modal.classList.remove("active");
          addForm.reset();
        }
      });

      addForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var name = document.getElementById("input-name").value.trim();
        var desc = document.getElementById("input-desc").value.trim();
        var searchQuery = document.getElementById("input-search").value.trim();
        var pw = document.getElementById("input-pw").value.trim();
        var submitBtn = addForm.querySelector(".btn-submit");
        if (!searchQuery) {
          alert("위치 검색어를 입력해 주세요.");
          return;
        }
        if (!pw) {
          alert("등록자 비밀번호를 입력해 주세요.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "검색 중…";
        var url =
          "https://nominatim.openstreetmap.org/search?q=" +
          encodeURIComponent(searchQuery) +
          "&format=json&limit=1";
        fetch(url, {
          headers: {
            "Accept-Language": "ko",
            "User-Agent": "BucheonMatAcademy/1.0",
          },
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            submitBtn.disabled = false;
            submitBtn.textContent = "지도에 박기";
            if (!data || data.length === 0) {
              alert(
                "위치를 찾을 수 없습니다. 인근 역명이나 주소로 다시 검색해 주세요.",
              );
              return;
            }
            var lat = parseFloat(data[0].lat);
            var lng = parseFloat(data[0].lon);
            var region =
              document.getElementById("input-region").value.trim() || "기타";
            var newId = Date.now();

            var newRest = {
              id: newId,
              name: name,
              desc: desc,
              lat: lat,
              lng: lng,
              password: pw,
              reviews: [],
              region: region,
            };
            restaurants.push(newRest);
            updateUI();
            focusRestaurant(newRest);
            modal.classList.remove("active");
            addForm.reset();

            if (typeof saveSingleRestaurantToFirestore === "function")
              saveSingleRestaurantToFirestore(newRest);
          })
          .catch(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = "지도에 박기";
            alert("검색 중 오류가 났습니다. 다시 시도해 주세요.");
          });
      });

      btnPwCancel.addEventListener("click", closePwModal);
      modalPw.addEventListener("click", function (e) {
        if (e.target.id === "modal-pw-backdrop") closePwModal();
      });

      // 엔터키를 치면 확인 버튼이 눌리도록 추가!
      inputPwCheck.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          btnPwConfirm.click();
        }
      });

      // --- 🚨 버그가 해결된 비밀번호 확인 로직 ---
      btnPwConfirm.addEventListener("click", function () {
        var rest = getRestById(pwRestId);
        if (!rest) {
          alert("맛집을 찾을 수 없습니다.");
          closePwModal();
          return;
        }
        var inputPw = String(inputPwCheck.value || "").trim();
        var expectedPw = String(rest.password || "0000").trim();
        if (expectedPw !== inputPw) {
          alert("비밀번호가 일치하지 않습니다.");
          return;
        }

        // 👉 핵심 해결 포인트: 창을 닫기(closePwModal) 전에 현재 상태를 안전하게 저장해둡니다!
        var currentAction = pwAction;
        var currentTargetId = pwRestId;

        // 이제 안전하게 기억을 지우고 창을 닫습니다.
        closePwModal();

        // 저장해둔 상태를 바탕으로 로직을 실행합니다.
        if (currentAction === "delete") {
          restaurants = restaurants.filter(function (r) {
            return Number(r.id) !== Number(currentTargetId);
          });
          updateUI();
          if (typeof removeRestaurantFromFirestore === "function")
            removeRestaurantFromFirestore(currentTargetId);
        } else if (currentAction === "edit") {
          openEditModal(rest);
        }
      });

      btnEditCancel.addEventListener("click", closeEditModal);
      modalEdit.addEventListener("click", function (e) {
        if (e.target.id === "modal-edit-backdrop") closeEditModal();
      });

      editForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var id = parseInt(document.getElementById("edit-id").value, 10);
        var name = document.getElementById("edit-name").value.trim();
        var desc = document.getElementById("edit-desc").value.trim();
        var searchQuery = document.getElementById("edit-search").value.trim();
        var rest = getRestById(id);
        if (!rest) return;

        rest.name = name;
        rest.desc = desc;
        var editRegion = document.getElementById("edit-region").value.trim();
        if (editRegion) rest.region = editRegion;

        var submitBtn = editForm.querySelector(".btn-submit");
        submitBtn.disabled = true;
        submitBtn.textContent = "저장 중...";

        if (searchQuery) {
          var url =
            "https://nominatim.openstreetmap.org/search?q=" +
            encodeURIComponent(searchQuery) +
            "&format=json&limit=1";
          fetch(url, {
            headers: {
              "Accept-Language": "ko",
              "User-Agent": "BucheonMatAcademy/1.0",
            },
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data && data.length > 0) {
                rest.lat = parseFloat(data[0].lat);
                rest.lng = parseFloat(data[0].lon);
              } else {
                alert("변경된 위치를 찾을 수 없어 기존 위치를 유지합니다.");
              }
              finishEdit(rest, submitBtn);
            })
            .catch(function () {
              alert("위치 검색 오류가 발생했습니다. 기존 위치로 저장합니다.");
              finishEdit(rest, submitBtn);
            });
        } else {
          finishEdit(rest, submitBtn);
        }
      });

      function finishEdit(rest, btn) {
        updateUI();
        closeEditModal();
        btn.disabled = false;
        btn.textContent = "수정 완료";
        if (typeof saveSingleRestaurantToFirestore === "function")
          saveSingleRestaurantToFirestore(rest);
      }

      btnReviewClose.addEventListener("click", closeReviewModal);
      modalReview.addEventListener("click", function (e) {
        if (e.target.id === "modal-review-backdrop") closeReviewModal();
      });

      reviewForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var restId = parseInt(
          document.getElementById("review-rest-id").value,
          10,
        );
        var author = document.getElementById("review-author").value.trim();
        var content = document.getElementById("review-content").value.trim();
        var rest = getRestById(restId);
        if (!rest) return;
        if (!rest.reviews) rest.reviews = [];
        rest.reviews.push({
          id: Date.now(),
          author: author,
          content: content,
          createdAt: new Date().toISOString(),
        });

        document.getElementById("review-author").value = "";
        document.getElementById("review-content").value = "";
        var listEl = document.getElementById("review-list");
        listEl.innerHTML = "";
        rest.reviews.forEach(function (r) {
          var li = document.createElement("li");
          li.innerHTML =
            '<div class="review-author">' +
            escapeHtml(r.author) +
            '</div><div class="review-content">' +
            escapeHtml(r.content) +
            "</div>";
          listEl.appendChild(li);
        });
        updateUI();
        if (typeof saveSingleRestaurantToFirestore === "function")
          saveSingleRestaurantToFirestore(rest);
      });

      normalizeRestaurants();

      function applyFirestoreSnapshot(snap) {
        restaurants = [];
        if (snap && !snap.empty) {
          snap.forEach(function (doc) {
            var d = doc.data();
            restaurants.push({
              id: Number(d.id),
              name: d.name || "",
              desc: d.desc || "",
              lat: Number(d.lat),
              lng: Number(d.lng),
              password:
                d.password != null && d.password !== ""
                  ? String(d.password)
                  : "0000",
              region: d.region || "기타",
              reviews: Array.isArray(d.reviews) ? d.reviews : [],
            });
          });
          restaurants.sort(function (a, b) {
            return a.id - b.id;
          });
          normalizeRestaurants();
        }
        if (selectedRegion) showRestaurantList();
        else showRegionList();
        if (map) updateMarkers();
      }

      function initFirebase() {
        if (typeof firebase === "undefined" || !firebase.firestore) return;
        var cfg = window.FIREBASE_CONFIG || window.FIREBASE_CONFIG_PLACEHOLDER;
        if (!cfg || !cfg.apiKey) return;
        try {
          if (!firebase.apps.length) firebase.initializeApp(cfg);
          var db = firebase.firestore();
          db.collection("restaurants").onSnapshot(
            function (snap) {
              applyFirestoreSnapshot(snap);
            },
            function (err) {
              console.warn("Firestore 연동 실패:", err);
            },
          );
        } catch (e) {
          console.warn("Firebase 초기화 실패:", e);
        }
      }

      function saveSingleRestaurantToFirestore(targetRest) {
        var cfg = window.FIREBASE_CONFIG || window.FIREBASE_CONFIG_PLACEHOLDER;
        if (
          typeof firebase === "undefined" ||
          !firebase.firestore ||
          !cfg ||
          !cfg.apiKey
        )
          return;

        firebase
          .firestore()
          .collection("restaurants")
          .doc(String(targetRest.id))
          .set({
            id: targetRest.id,
            name: targetRest.name,
            desc: targetRest.desc,
            lat: targetRest.lat,
            lng: targetRest.lng,
            password: targetRest.password,
            region: targetRest.region || "기타",
            reviews: targetRest.reviews || [],
          })
          .then(function () {
            console.log("서버에 반영 완료! 🚀");
          })
          .catch(function (error) {
            alert(
              "🚨 서버 저장/수정 실패!\n에러 내용: " +
                error.message +
                "\n\n(Firebase 보안 규칙이 잠겨있는 것 같습니다.)",
            );
          });
      }

      function removeRestaurantFromFirestore(restId) {
        var cfg = window.FIREBASE_CONFIG || window.FIREBASE_CONFIG_PLACEHOLDER;
        if (
          typeof firebase === "undefined" ||
          !firebase.firestore ||
          !cfg ||
          !cfg.apiKey
        )
          return;

        firebase
          .firestore()
          .collection("restaurants")
          .doc(String(restId))
          .delete()
          .then(function () {
            console.log("서버에서 삭제 완료! 🗑️");
          })
          .catch(function (error) {
            alert(
              "🚨 서버 삭제 실패!\n에러 내용: " +
                error.message +
                "\n\n(Firebase 보안 규칙이 잠겨있는 것 같습니다.)",
            );
          });
      }

      (function () {
        var cfg = window.FIREBASE_CONFIG_PLACEHOLDER;
        if (cfg && cfg.apiKey) {
          window.FIREBASE_CONFIG = cfg;
          regionListEl.innerHTML = '<li class="review-empty">불러오는 중…</li>';
          regionListEl.style.display = "";
          listContainer.style.display = "none";
          initFirebase();
        } else {
          showRegionList();
          if (map) updateMarkers();
        }
      })();
      // --- 📱 모바일 UX: 바텀 시트 드래그 & 스냅 로직 ---
      (function initBottomSheet() {
        const sheet = document.getElementById("bottom-sheet");
        const header = document.getElementById("sheet-header");
        const handle = document.getElementById("drag-handle");
        if (!sheet || !header || !handle) return;

        let startY = 0;
        let startHeight = 0;
        let isDragging = false;

        function onDragStart(e) {
          if (window.innerWidth > 768) return;
          isDragging = true;
          startY = e.touches ? e.touches[0].clientY : e.clientY;
          startHeight = sheet.getBoundingClientRect().height;
          sheet.classList.add("dragging");
        }

        function onDragMove(e) {
          if (!isDragging) return;
          const currentY = e.touches ? e.touches[0].clientY : e.clientY;
          const deltaY = startY - currentY;
          let newHeight = startHeight + deltaY;
          const vh = window.innerHeight;

          if (newHeight > vh * 0.9) newHeight = vh * 0.9;
          if (newHeight < vh * 0.15) newHeight = vh * 0.15;

          sheet.style.height = `${newHeight}px`;
          document.documentElement.style.setProperty(
            "--sheet-height",
            `${newHeight}px`,
          );
        }

        function onDragEnd() {
          if (!isDragging) return;
          isDragging = false;
          sheet.classList.remove("dragging");

          const currentHeight = sheet.getBoundingClientRect().height;
          const vh = window.innerHeight;
          let snapHeight;

          if (currentHeight > vh * 0.65) snapHeight = 90;
          else if (currentHeight < vh * 0.3) snapHeight = 15;
          else snapHeight = 45;

          sheet.style.height = `${snapHeight}vh`;
          document.documentElement.style.setProperty(
            "--sheet-height",
            `${snapHeight}vh`,
          );
        }

        header.addEventListener("touchstart", onDragStart, { passive: true });
        handle.addEventListener("touchstart", onDragStart, { passive: true });
        window.addEventListener("touchmove", onDragMove, { passive: true });
        window.addEventListener("touchend", onDragEnd);
        // 👇 굳어짐(프리징) 현상을 완벽 차단하는 생명줄!
        window.addEventListener("touchcancel", onDragEnd);
      })();
    </script>
  </body>
</html>
